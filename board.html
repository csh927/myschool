<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DMU Board - Live Database</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --notion-bg: #191919;
            --notion-sidebar: #202020;
            --notion-hover: #2c2c2c;
            --notion-text: #ffffff;
            --notion-subtext: rgba(255, 255, 255, 0.4);
            --notion-border: rgba(255, 255, 255, 0.08);
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: var(--notion-bg);
            color: var(--notion-text);
            margin: 0;
            display: flex;
        }

        .sidebar {
            width: 250px;
            background-color: var(--notion-sidebar);
            height: 100vh;
            border-right: 1px solid var(--notion-border);
            position: sticky;
            top: 0;
            display: flex;
            flex-direction: column;
        }

        .sidebar-header {
            padding: 12px 14px;
            font-weight: 600;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 4px 14px;
            margin: 1px 0;
            cursor: pointer;
            font-size: 13px;
            color: var(--notion-text);
            text-decoration: none;
        }

        .nav-item:hover {
            background-color: var(--notion-hover);
        }

        .section-title {
            padding: 14px 16px 4px;
            font-size: 11px;
            font-weight: 600;
            color: var(--notion-subtext);
            text-transform: uppercase;
        }

        .main-content {
            flex: 1;
            height: 100vh;
            overflow-y: auto;
        }

        .page-container {
            max-width: 900px;
            margin: 0 auto;
            padding: 60px 80px;
        }

        .db-row {
            border-bottom: 1px solid var(--notion-border);
            transition: background 0.1s;
        }

        .db-row:hover {
            background-color: rgba(255, 255, 255, 0.03);
        }

        ::-webkit-scrollbar {
            width: 5px;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.05);
        }
    </style>
</head>

<body class="flex">
    <aside class="sidebar py-2">
        <div class="sidebar-header">
            <img src="assets/ai_note_icon.png" alt="AI Note Icon" class="h-6 w-6 object-contain">
            <span>Notion AI</span>
        </div>
        <a href="index.html" class="nav-item"><i data-lucide="home" class="w-4 h-4 text-slate-500"></i><span>홈
                페이지</span></a>

        <div class="section-title">개인 페이지</div>
        <a href="index.html" class="nav-item"><i data-lucide="file-text" class="w-4 h-4 text-slate-400"></i><span>학교
                소개</span></a>
        <a href="index.html" class="nav-item"><i data-lucide="file-text" class="w-4 h-4 text-slate-400"></i><span>학과
                소개</span></a>
        <a href="index.html" class="nav-item"><i data-lucide="file-text" class="w-4 h-4 text-slate-400"></i><span>나의
                포트폴리오</span></a>
        <a href="index.html" class="nav-item"><i data-lucide="file-text" class="w-4 h-4 text-slate-400"></i><span>관련
                회사</span></a>
        <a href="index.html" class="nav-item"><i data-lucide="file-text" class="w-4 h-4 text-slate-400"></i><span>학교
                생활</span></a>

        <div class="section-title">데이터베이스</div>
        <div class="nav-item bg-[#2c2c2c]"><i data-lucide="table" class="w-4 h-4 text-slate-400"></i><span>실시간
                게시판</span></div>
    </aside>

    <main class="main-content">
        <div class="page-container">
            <div class="flex justify-between items-end mb-8">
                <div>
                    <div class="text-[78px] mb-2 leading-none">📋</div>
                    <h1 class="text-4xl font-bold">실시간 데이터베이스</h1>
                    <p class="text-slate-500 mt-3 text-sm">Firebase Cloud Firestore 동기화 중</p>
                </div>
                <button onclick="window.submitPost()"
                    class="bg-blue-600 hover:bg-blue-500 text-white text-xs px-4 py-2 rounded font-semibold transition flex items-center gap-2">
                    <i data-lucide="plus" class="w-3 h-3"></i> 데이터 추가
                </button>
            </div>

            <div class="border border-white/10 rounded-lg overflow-hidden bg-white/5">
                <div
                    class="grid grid-cols-12 gap-4 p-3 bg-white/5 text-[11px] font-bold text-slate-500 uppercase tracking-widest">
                    <div class="col-span-8">항목명 / 상세 내용</div>
                    <div class="col-span-2 text-center">상태</div>
                    <div class="col-span-2 text-right">등록일</div>
                </div>
                <div id="db-content"></div>
            </div>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDsEhd8_n_ab_NVWLlx6K-7Y_-1xcnN47w",
            authDomain: "my-school-homepage.firebaseapp.com",
            projectId: "my-school-homepage",
            storageBucket: "my-school-homepage.firebasestorage.app",
            messagingSenderId: "458349452372",
            appId: "1:458349452372:web:f85e926a05e1a2e0b9a1c1"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        window.submitPost = async () => {
            const title = prompt("항목 제목을 입력하세요:");
            const content = prompt("상세 설명을 입력하세요:");
            if (title) await addDoc(collection(db, "posts"), { title, content: content || "", author: "사용자", createdAt: serverTimestamp() });
        };

        const q = query(collection(db, "posts"), orderBy("createdAt", "desc"));
        onSnapshot(q, snap => {
            const list = document.getElementById('db-content');
            list.innerHTML = '';
            snap.forEach(doc => {
                const data = doc.data();
                const date = data.createdAt ? new Date(data.createdAt.seconds * 1000).toLocaleDateString() : '-';
                list.innerHTML += `
                    <div class="grid grid-cols-12 gap-4 p-4 db-row text-sm">
                        <div class="col-span-8 text-white font-medium">${data.title}<br><span class="text-[12px] text-slate-500">${data.content}</span></div>
                        <div class="col-span-2 text-center"><span class="bg-blue-500/20 text-blue-400 text-[10px] px-2 py-0.5 rounded-full uppercase">Active</span></div>
                        <div class="col-span-2 text-right text-slate-600">${date}</div>
                    </div>`;
            });
            lucide.createIcons();
        });
    </script>
</body>

</html>
