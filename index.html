<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DMU Personal Workspace</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --notion-bg: #191919;
            --notion-sidebar: #202020;
            --notion-hover: #2c2c2c;
            --notion-text: #ffffff;
            --notion-subtext: rgba(255, 255, 255, 0.4);
            --notion-border: rgba(255, 255, 255, 0.08);
            --card-bg: #252525;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: var(--notion-bg);
            color: var(--notion-text);
            overflow: hidden;
            margin: 0;
            -webkit-font-smoothing: antialiased;
        }

        .sidebar {
            width: 250px;
            background-color: var(--notion-sidebar);
            height: 100vh;
            border-right: 1px solid var(--notion-border);
            display: flex;
            flex-direction: column;
        }

        .sidebar-header { padding: 12px 14px; font-weight: 600; font-size: 14px; display: flex; align-items: center; gap: 8px; }

        .nav-item {
            display: flex; align-items: center; gap: 10px; padding: 4px 14px; margin: 1px 0;
            cursor: pointer; font-size: 13px; color: var(--notion-text); text-decoration: none;
        }

        .nav-item:hover { background-color: var(--notion-hover); }
        .nav-item.active { background-color: var(--notion-hover); }

        .section-title { padding: 14px 16px 4px; font-size: 11px; font-weight: 600; color: var(--notion-subtext); text-transform: uppercase; }

        .main-content { flex: 1; height: 100vh; overflow-y: auto; }
        .page-container { max-width: 900px; margin: 0 auto; padding: 50px 80px; }

        .notion-card {
            width: 140px; height: 180px; background-color: var(--card-bg); border: 1px solid var(--notion-border);
            border-radius: 8px; padding: 20px; display: flex; flex-direction: column; gap: 10px;
            cursor: pointer; transition: background 0.2s;
        }

        .notion-card:hover { background-color: #2f2f2f; }
        .badge-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }

        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.05); }
    </style>
</head>

<body class="flex">
    <aside class="sidebar">
        <div class="sidebar-header">
            <img src="https://www.dongyang.ac.kr/sites/dmu/images/common/logo.png" class="h-4 brightness-200">
            <span>Notion</span>
        </div>

        <div class="nav-item"><i data-lucide="search" class="w-4 h-4 text-slate-500"></i><span>검색</span></div>
        <div class="nav-item"><i data-lucide="clock" class="w-4 h-4 text-slate-500"></i><span>업데이트</span></div>
        <div class="nav-item"><i data-lucide="settings" class="w-4 h-4 text-slate-500"></i><span>설정</span></div>

        <div class="section-title">최근 항목</div>
        <div class="nav-item active" onclick="showPage('home', this)"><i data-lucide="layout-grid" class="w-4 h-4 text-slate-400"></i><span>홈 페이지</span></div>
        <div class="nav-item" onclick="showPage('dept', this)"><i data-lucide="file-text" class="w-4 h-4 text-slate-400"></i><span>학과 소개</span></div>

        <div class="section-title">개인 페이지</div>
        <div class="nav-item" onclick="showPage('school', this)"><i data-lucide="file-text" class="w-4 h-4 text-slate-400"></i><span>학교 소개</span></div>
        <div class="nav-item" onclick="showPage('dept', this)"><i data-lucide="file-text" class="w-4 h-4 text-slate-400"></i><span>학과 소개</span></div>
        <div class="nav-item" onclick="showPage('portfolio', this)"><i data-lucide="file-text" class="w-4 h-4 text-slate-400"></i><span>나의 포트폴리오</span></div>
        <div class="nav-item" onclick="showPage('company', this)"><i data-lucide="file-text" class="w-4 h-4 text-slate-400"></i><span>관련 회사</span></div>
        <div class="nav-item" onclick="showPage('life', this)"><i data-lucide="file-text" class="w-4 h-4 text-slate-400"></i><span>학교 생활</span></div>
        
        <div class="section-title">데이터베이스</div>
        <a href="board.html" class="nav-item"><i data-lucide="table" class="w-4 h-4 text-slate-400"></i><span>실시간 게시판</span></a>
    </aside>

    <main class="main-content">
        <div id="content-body" class="page-container"></div>
    </main>

    <script>
        const pages = {
            home: `
                <div class="flex items-center gap-2 text-xs text-slate-500 mb-8"><i data-lucide="clock" class="w-3 h-3"></i> 최근 방문</div>
                <div class="flex flex-wrap gap-4">
                    <div class="notion-card" onclick="showPage('school')">
                        <i data-lucide="file-text" class="w-6 h-6 text-slate-400"></i>
                        <div class="text-[13px] font-medium leading-tight">학교 소개</div>
                        <div class="mt-auto flex items-center gap-2 text-[10px] text-slate-500">
                            <span class="badge-dot bg-purple-500"></span> 오늘
                        </div>
                    </div>
                    <div class="notion-card" onclick="showPage('dept')">
                        <i data-lucide="file-text" class="w-6 h-6 text-slate-400"></i>
                        <div class="text-[13px] font-medium leading-tight">학과 소개</div>
                        <div class="mt-auto flex items-center gap-2 text-[10px] text-slate-500">
                            <span class="badge-dot bg-purple-500"></span> 오늘
                        </div>
                    </div>
                    <div class="notion-card" onclick="showPage('portfolio')">
                        <i data-lucide="file-text" class="w-6 h-6 text-slate-400"></i>
                        <div class="text-[13px] font-medium leading-tight">나의 포트폴리오</div>
                        <div class="mt-auto flex items-center gap-2 text-[10px] text-slate-500">
                            <span class="badge-dot bg-blue-500"></span> 어제
                        </div>
                    </div>
                    <div class="notion-card flex items-center justify-center opacity-40 hover:opacity-100">
                        <i data-lucide="plus" class="w-6 h-6"></i>
                    </div>
                </div>
            `,
            school: `<h1 class="text-3xl font-bold mb-4">🏠 학교 소개</h1><p class="text-slate-400">동양미래대학교의 역사와 비전을 소개합니다.</p>`,
            dept: `<h1 class="text-3xl font-bold mb-4">📚 학과 소개</h1><p class="text-slate-400">전공별 교육 과정과 진로를 안내합니다.</p>`,
            portfolio: `<h1 class="text-3xl font-bold mb-4">🎨 나의 포트폴리오</h1><p class="text-slate-400">지금까지 진행한 프로젝트들을 정리한 공간입니다.</p>`,
            company: `<h1 class="text-3xl font-bold mb-4">🏢 관련 회사</h1><p class="text-slate-400">주요 산학 협력 업체 및 취업 연계 회사 정보입니다.</p>`,
            life: `<h1 class="text-3xl font-bold mb-4">✨ 학교 생활</h1><p class="text-slate-400">캠퍼스 라이프, 동아리, 시설 안내 페이지입니다.</p>`
        };

        window.showPage = (id, el) => {
            if (el) {
                document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
                el.classList.add('active');
            }
            document.getElementById('content-body').innerHTML = pages[id];
            lucide.createIcons();
            document.querySelector('.main-content').scrollTop = 0;
        }

        document.addEventListener('DOMContentLoaded', () => {
            showPage('home');
            lucide.createIcons();
        });
    </script>
</body>
</html>
